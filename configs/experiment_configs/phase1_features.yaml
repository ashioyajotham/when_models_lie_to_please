# Phase 1: Feature Discovery
# Identify SAE features differentially active during faithful/unfaithful reasoning
# and sycophantic/non-sycophantic responses.

model: gemma3_4b
sae_width: 16x
hook_point: resid_post

datasets:
  - cot_bias
  - cot_contradiction
  - sycophancy_opinion
  - sycophancy_pressure
  - cross_domain

dataset_params:
  min_pairs_per_dataset: 500
  batch_size: 8
  max_new_tokens: 512
  temperature: 0.0            # Greedy decoding for reproducibility

differential_analysis:
  method: mean_diff            # Δf = f_treatment - f_control, averaged over prompts
  multiple_comparisons: bonferroni
  alpha: 0.05
  top_k_features: 200          # Retain top-200 per layer for characterization

clustering:
  method: hierarchical
  linkage: ward
  n_clusters: null             # Determine by dendrogram; use elbow heuristic
  layer_profiles:
    # Classify features as early (layers 0-8), mid (9-17), late (18-25) for 4B
    early: [0, 8]
    mid: [9, 17]
    late: [18, 25]

characterization:
  use_neuronpedia: true
  max_activating_examples: 20  # Per feature, for manual inspection
  autointerpret_top_k: 50      # Run autointerpretation on top-50 features

output:
  results_dir: experiments/results/phase1
  save_feature_catalog: true
  save_layer_profiles: true
  save_activation_cache: true
